services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pdf_art_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:postgres@db:5432/pdf_art_generator
      SKYPER_LOGIN_URL: ${SKYPER_LOGIN_URL}
      SKYPER_PRODUCTS_URL: ${SKYPER_PRODUCTS_URL}
      SKYPER_USERNAME: ${SKYPER_USERNAME}
      SKYPER_PASSWORD: ${SKYPER_PASSWORD}
      OCR_API_KEY: ${OCR_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
    depends_on:
      - api

volumes:
  pgdata:
